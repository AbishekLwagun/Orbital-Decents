name: CI Checks (No Build)

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  basic-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Check for huge files (over 200MB)
        run: |
          MAX=200
          BIG=$(find . -type f -size +${MAX}M | head -n 20)
          if [ -n "$BIG" ]; then
            echo "Found files larger than ${MAX}MB:"
            echo "$BIG"
            exit 1
          fi

      - name: List changed Unity project version (info only)
        run: |
          if [ -f ProjectSettings/ProjectVersion.txt ]; then
            echo "Unity version:"
            cat ProjectSettings/ProjectVersion.txt
          else
            echo "ProjectSettings/ProjectVersion.txt not found"
          fi
